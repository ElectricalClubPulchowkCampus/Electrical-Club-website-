services:
  mysql:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal
  strapi:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file: ./backend/.env
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "1337:1337"
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - internal
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    env_file: ./frontend/.env
    depends_on:
      - strapi
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - internal

volumes:
  mysql_dev_data:

networks:
  internal: